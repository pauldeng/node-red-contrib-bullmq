name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    # Configure a "release" environment with a required reviewer in repo
    # settings to gate publishing behind a manual approval.
    environment: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Ensure npm supports trusted publishing
        # Trusted publishing (OIDC) needs npm >= 11.5.1 and Node >= 22.14.0.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run unit and contract tests
        run: npm test

      - name: Run editor tests
        run: npm run test:playwright

      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        # With trusted publishing configured on npmjs.com, no token is needed
        # and provenance is attached automatically.
        run: npm publish --access public
