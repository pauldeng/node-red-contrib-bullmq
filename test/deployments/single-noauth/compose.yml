services:
  redis:
    image: ${REDIS_STANDALONE_IMAGE:-redis:7.2-alpine}
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory-policy
      - noeviction
    ports:
      - "127.0.0.1:${BULLMQ_SINGLE_NOAUTH_PORT:-16379}:6379"
