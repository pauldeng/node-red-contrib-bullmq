port 0
tls-port 17002
bind 127.0.0.1
protected-mode no
save ""
appendonly no
dir /data
maxmemory-policy noeviction

tls-cert-file /tls/redis.crt
tls-key-file /tls/redis.key
tls-ca-cert-file /tls/ca.crt
tls-auth-clients no
tls-cluster yes
tls-replication yes

cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-announce-ip 127.0.0.1
cluster-announce-tls-port 17002
cluster-announce-bus-port 27002
