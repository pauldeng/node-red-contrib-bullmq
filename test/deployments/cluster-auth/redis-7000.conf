port 17000
bind 127.0.0.1
protected-mode no
save ""
appendonly no
dir /data
maxmemory-policy noeviction

cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-announce-ip 127.0.0.1
cluster-announce-port 17000
cluster-announce-bus-port 27000

user default off
user node_red on >node-red-pass ~* &* +@all
